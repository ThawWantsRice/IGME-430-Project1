<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="bundle.js"></script>
    <title>API Test Page</title>
</head>

<body>
    <h1>Pokemon API Test</h1>
    <a href="documentation.html">Documentation Page</a>

    <!-- Section: GET Pokémon -->
    <section id="getAPI">

        <div class="form-box">
            <h2>Get Pokemon</h2>
            <form action="/getPokemon" id="getPokemonForm">
                <label for="pokemonName">Name (optional): </label>
                <input type="text" name="name" placeholder="e.g. Bulbasaur"><br>
                <label for="Get">Get</label>
                <input type="radio" name="method" value="GET" checked>
                <label for="Head">Head</label>
                <input type="radio" name="method" value="HEAD">
                <button type="submit">Get Pokemon</button>
            </form>
        </div>

        <div class="form-box">
            <h2>Get Pokemon Type</h2>
            <form action="/getPokemonType" id="getPokemonTypeForm">
                <label for="pokemonType">Type (required): </label>
                <input type="text" name="type" placeholder="Fire" required><br>
                <label for="Get">Get</label>
                <input type="radio" name="method" value="GET" checked>
                <label for="Head">Head</label>
                <input type="radio" name="method" value="HEAD">
                <button type="submit">Get Pokemon Type</button>
            </form>
        </div>

        <div class="form-box">
            <h2>Get Pokemon IMG</h2>
            <form action="/getPokemonIMG" id="getPokemonIMGForm">
                <label for="pokemonName">Name (required): </label>
                <input type="text" name="name" placeholder="e.g. Bulbasaur" required><br>
                <label for="Get">Get</label>
                <input type="radio" name="method" value="GET" checked>
                <label for="Head">Head</label>
                <input type="radio" name="method" value="HEAD">
                <button type="submit">Get Pokemon</button>
            </form>
        </div>

        <div class="form-box">
            <h2>Get Pokemon Size</h2>
            <form action="/getPokemonSize" id="getPokemonSizeForm">
                <label for="pokemonName">Name (required): </label>
                <input type="text" name="name" placeholder="e.g. Bulbasaur" required><br>
                <label for="Get">Get</label>
                <input type="radio" name="method" value="GET" checked>
                <label for="Head">Head</label>
                <input type="radio" name="method" value="HEAD">
                <button type="submit">Get Pokemon</button>
            </form>
        </div>

    </section>

    <!-- Section: Add/Update Pokémon -->
    <section>
        <div class="form-box">
            <h2>Add or Update Pokémon</h2>
            <form id="addPokemonForm" action="/addPokemon" method="post">
                <label>Name:</label>
                <input type="text" id="addPokemonName" required placeholder="Bulbasaur" />

                <label>Primary Type:</label>
                <select id="addPrimaryType" required>
                    <option value="">-- Select Type --</option>
                    <option value="Normal">Normal</option>
                    <option value="Fire">Fire</option>
                    <option value="Water">Water</option>
                    <option value="Electric">Electric</option>
                    <option value="Grass">Grass</option>
                    <option value="Ice">Ice</option>
                    <option value="Fighting">Fighting</option>
                    <option value="Poison">Poison</option>
                    <option value="Ground">Ground</option>
                    <option value="Flying">Flying</option>
                    <option value="Psychic">Psychic</option>
                    <option value="Bug">Bug</option>
                    <option value="Rock">Rock</option>
                    <option value="Ghost">Ghost</option>
                    <option value="Dragon">Dragon</option>
                    <option value="Dark">Dark</option>
                    <option value="Steel">Steel</option>
                    <option value="Fairy">Fairy</option>
                </select>


                <label>Secondary Type(Optional):</label>
                <select id="addSecondaryType">
                    <option value="">-- None --</option>
                    <option value="Normal">Normal</option>
                    <option value="Fire">Fire</option>
                    <option value="Water">Water</option>
                    <option value="Electric">Electric</option>
                    <option value="Grass">Grass</option>
                    <option value="Ice">Ice</option>
                    <option value="Fighting">Fighting</option>
                    <option value="Poison">Poison</option>
                    <option value="Ground">Ground</option>
                    <option value="Flying">Flying</option>
                    <option value="Psychic">Psychic</option>
                    <option value="Bug">Bug</option>
                    <option value="Rock">Rock</option>
                    <option value="Ghost">Ghost</option>
                    <option value="Dragon">Dragon</option>
                    <option value="Dark">Dark</option>
                    <option value="Steel">Steel</option>
                    <option value="Fairy">Fairy</option>
                </select>

                <label>Weight:</label>
                <input type="text" id="addWeight" required placeholder="6.9 kg" />

                <label>Height:</label>
                <input type="text" id="addHeight" required placeholder="0.71 m" />

                <label>Image URL (optional):</label>
                <input type="text" id="addImg" placeholder="http://..." />

                <select name="dataType" id="addDataType">
                    <option value="application/x-www-form-urlencoded">URL Encoded</option>
                    <option value="application/json">JSON</option>
                </select>
                <button type="submit">Submit</button>
            </form>
        </div>
    </section>

    <section>
        <h2>Response</h2>
        <div id="content">API responses will appear here...</div>
    </section>
</body>

</html>
